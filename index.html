<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Яна Шатурина</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #111111);
      display: grid;
      place-items: center;
    }

    .card {
      width: min(100%, 520px);
      padding: 28px;
      border-radius: 22px;
      background: var(--tg-theme-secondary-bg-color, #f3f5f7);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 17px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Привет, Яна!</h1>
    <p>Твоё первое Telegram Mini App работает.</p>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
  </script>
</body>
</html>
